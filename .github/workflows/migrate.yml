name: Supabase Migrations

on:
  push:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/schemas/**'
      - 'supabase/seed/**'
      - '.github/workflows/migrate.yml'
    branches:
      - main

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      
      - name: Install Supabase CLI
        run: npm install supabase
      
      - name: Run Supabase Migrations
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          apt-get update && apt-get install -y dnsutils
          dig ${{ secrets.SUPABASE_PROJECT_REF }}.db.supabase.co
          echo "Using host: $SUPABASE_PROJECT_REF.db.supabase.co"
          npx supabase db push --db-url "postgresql://postgres:$SUPABASE_SERVICE_ROLE_KEY@$SUPABASE_PROJECT_REF.db.supabase.co:5432/postgres" --debug

