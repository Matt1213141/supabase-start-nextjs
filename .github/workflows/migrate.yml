name: Supabase Migrations

on:
  push:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/schemas/**'
      - 'supabase/seed/**'
      - '.github/workflows/migrate.yml'
    branches:
      - main

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      
      - name: Install Supabase CLI
        run: npm install supabase
      
      - name: Run Supabase Migrations
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DATABASE_PASSWORD: ${{ secrets.SUPABASE_DATABASE_PASSWORD }}
        run: |
          npx supabase db push --db-url "postgresql://postgres.$SUPABASE_PROJECT_REF:$SUPABASE_DATABASE_PASSWORD@aws-0-us-west-2.pooler.supabase.com:5432/postgres"